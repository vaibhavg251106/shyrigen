<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <title>Shayari Generator</title>

</head>

<body>
  <div class="card">
    <h1>Shayari Generator</h1>
    <div class="sub">Dil se nikli baatein, ek click pe ✨</div>
    <div id="shayari">Click the button for getting a new shayari...</div>
    <div class="controls">
      <button class="secondary" onclick="prevShayari()">⬅ Prev</button>
      <button class="secondary" onclick="copyText()">📋 Copy</button>
      <button class="primary" onclick="nextShayari()">Next ➜</button>
    </div>
    <div class="sub" id="count">1 / 6</div>
    <small>By Vaibhav Gupta</small>
  </div>
  <script src="script.js"></script>
</body>

</html>
